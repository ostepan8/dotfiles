# Aerospace config — tiling window manager for macOS.
# Docs: https://github.com/nikitabobko/AeroSpace
#
# Known conflicts with the tmux config in this repo:
#   - Alt+1-9    used by tmux for window switching  → Aerospace takes priority (use `prefix + N` in tmux)
#   - Alt+h/j/k/l used by tmux for pane switching   → Aerospace takes priority (use Ctrl+h/j/k/l via vim-tmux-navigator)
# If you prefer to keep tmux's Alt bindings, rebind Aerospace to cmd-alt-* below.

start-at-login = true

# Normalize container structure — avoids weird nested layouts after windows move.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Accordion layout stays mostly-collapsed (better for stacks of code editors)
accordion-padding = 30

# Auto-pick horizontal vs vertical split based on window dimensions
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Don't let windows animate off-screen when switching workspaces.
# flatten-workspace-tree forces a retile so windows resize to the new monitor's
# dimensions — fixes the "windows are wrong size after primary-display change" bug.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center', 'flatten-workspace-tree']

# Reconcile main display + per-monitor gap + workspace pins to the currently
# attached monitors on every aerospace start. Mirrors what the
# com.ostepan.display-watcher LaunchAgent does on plug/unplug — running it
# here too covers the cold-start case (laptop closed → opened, reload-config).
after-startup-command = ['exec-and-forget ~/.config/aerospace/set-main-display.sh auto']

# On workspace change:
#   1. notify sketchybar so the workspace indicator highlights correctly
#   2. fire the phantom-window cleanup in the background — apps like
#      Messages frequently leave stale windows in AeroSpace's tree, and
#      this self-heals the moment you'd actually notice misalignment.
#      The script is sub-100ms and runs detached (`&`), so no input lag.
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE; ~/.config/aerospace/cleanup-phantoms.sh &'
]

# ==========================
# Mouse / key interaction
# ==========================
automatically-unhide-macos-hidden-apps = false

# Pin workspaces 9 and 10 to external monitors.
# This block is REWRITTEN on every set-main-display.sh run (auto from the
# display-watcher LaunchAgent, or via cmd-alt-[/]/\) so the regex always
# matches whatever externals are currently attached:
#   2+ externals — 9 → rightmost, 10 → leftmost
#   1 external  — both 9 and 10 → the one external
#   0 externals — block left empty so 9/10 land on the laptop by default
# Hand-edits below the header are blown away on the next reload — modify
# set-main-display.sh if you need to change the pin policy.
[workspace-to-monitor-force-assignment]
9  = '^HP 327se$'
10 = '^HP 327se$'

[key-mapping]
preset = 'qwerty'

# ==========================
# Gaps between windows + from screen edge
# ==========================
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.right      = 8
# Top gap: 40px reserved on the macOS main display only (where sketchybar
# lives), 8px on the others (edge-to-edge tiling — no bar to clear). This
# line is rewritten by set-main-display.sh on every Cmd+Opt+[/]/\ swap to
# track whichever monitor is currently main. Hand-edit only the "40" or "8"
# values — the monitor pattern is overwritten by the script.
outer.top        = [{ monitor.'HP 327se' = 40 }, 8]

# ==========================
# Main mode bindings
# ==========================
[mode.main.binding]

# --- Focus (vim-style) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move window in current workspace ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Resize focused window ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'
alt-shift-equal = 'balance-sizes'

# --- Layout tweaks ---
alt-slash = 'layout tiles horizontal vertical'   # toggle tile orientation
alt-comma = 'layout accordion horizontal vertical' # stack view
alt-f     = 'fullscreen'
alt-shift-space = 'layout floating tiling'        # toggle float/tile

# --- Workspaces (jump to) ---
# Chaining 'move-mouse monitor-lazy-center' pulls the cursor onto the new
# workspace's monitor — needed because on-focused-monitor-changed doesn't
# always fire reliably when switching workspaces across monitors.
alt-1 = ['workspace 1',  'move-mouse monitor-lazy-center']
alt-2 = ['workspace 2',  'move-mouse monitor-lazy-center']
alt-3 = ['workspace 3',  'move-mouse monitor-lazy-center']
alt-4 = ['workspace 4',  'move-mouse monitor-lazy-center']
alt-5 = ['workspace 5',  'move-mouse monitor-lazy-center']
alt-6 = ['workspace 6',  'move-mouse monitor-lazy-center']
alt-7 = ['workspace 7',  'move-mouse monitor-lazy-center']
alt-8 = ['workspace 8',  'move-mouse monitor-lazy-center']
alt-9 = ['workspace 9',  'move-mouse monitor-lazy-center']
alt-0 = ['workspace 10', 'move-mouse monitor-lazy-center']

# --- Move current window to workspace N ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# --- Workspace "back and forth" (like tmux last-window) ---
alt-tab = 'workspace-back-and-forth'

# --- Monitor navigation ---
#   Alt+[        → focus LEFT external
#   Alt+]        → focus RIGHT external
#   Alt+\        → home (laptop — always goes to laptop's currently-visible workspace)
#   Alt+Shift+[  → send focused window to LEFT external + follow
#   Alt+Shift+]  → send focused window to RIGHT external + follow
#   Alt+Shift+\  → send focused window to LAPTOP + follow
# Bracket trio: [ ] \ are physically adjacent on US keyboards, so the three
# focus targets sit under the same finger row. All four bracket bindings go
# through focus-external.sh / move-external.sh so they degrade gracefully
# with 1 external (both → the only external workspace) and 0 externals
# (both → focus-home / move-home). Symmetric with the cmd-alt-[/]/\
# bindings below that swap the macOS main display.
alt-leftSquareBracket        = 'exec-and-forget ~/.config/aerospace/focus-external.sh left'
alt-rightSquareBracket       = 'exec-and-forget ~/.config/aerospace/focus-external.sh right'
alt-backslash                = 'exec-and-forget ~/.config/aerospace/focus-home.sh'
alt-shift-leftSquareBracket  = 'exec-and-forget ~/.config/aerospace/move-external.sh left'
alt-shift-rightSquareBracket = 'exec-and-forget ~/.config/aerospace/move-external.sh right'
alt-shift-backslash          = 'exec-and-forget ~/.config/aerospace/move-home.sh'

# --- Reload Aerospace config ---
alt-shift-c = 'reload-config'

# --- Manually run the phantom-window watchdog ---
# Same script the launchd job runs every 60s; bind it to a hotkey so
# whenever tiles look misaligned (shadow window from a closed-but-not-
# released app window) you can press once and it cleans the tree.
alt-shift-r = 'exec-and-forget ~/.config/aerospace/cleanup-phantoms.sh'

# --- Swap macOS "main display" (where the menu bar + sketchybar live) ---
#   Cmd+Opt+[   → make LEFT external the main display    (⌘ ⌥ [)
#   Cmd+Opt+]   → make RIGHT external the main display   (⌘ ⌥ ])
#   Cmd+Opt+\   → make laptop the main display           (⌘ ⌥ \)
# Same bracket trio as the alt-[/]/\ focus bindings — adding cmd promotes
# "focus that monitor" → "make that monitor the macOS main display."
# Persistent display IDs come from ~/.config/aerospace/displays.env.
# Requires `displayplacer` (brew install jakehilborn/jakehilborn/displayplacer).
cmd-alt-leftSquareBracket  = 'exec-and-forget ~/.config/aerospace/set-main-display.sh left'
cmd-alt-rightSquareBracket = 'exec-and-forget ~/.config/aerospace/set-main-display.sh right'
cmd-alt-backslash          = 'exec-and-forget ~/.config/aerospace/set-main-display.sh laptop'

# --- Re-detect monitor IDs by physical position ---
# Run this after swapping cables, reconnecting a dock, or any time the
# Cmd+Opt+[/]/\ bindings above stop working. Updates displays.env in-place
# and fires a macOS notification when done.
cmd-alt-shift-r = 'exec-and-forget ~/.config/aerospace/refresh-display-ids.sh'

# ==========================
# Apps that should always float (not tile)
# ==========================
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.archiveutility'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

# Apps that pop up / stay on top — let them float instead of fighting tiling
[[on-window-detected]]
if.app-id = 'com.grammarly.ProjectLlama'
run = 'layout floating'

# Spotify intentionally tiles. Floating left it stuck at its previous size
# whenever the monitor changed (AeroSpace doesn't auto-resize floats), so
# Spotify would land tiny + behind other windows. Tiling makes it fill its
# slot like any other app. The earlier "glitches when tiled" note was from
# an older AeroSpace version; 0.20.x handles it fine.

# Apple Music + Messages intentionally tile — same reason as Spotify above:
# floating left them stuck at their previous geometry whenever the monitor
# changed (AeroSpace doesn't auto-resize floats), so they'd land tiny and
# behind other windows. Tiling gives them a real slot every time.

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.grammarly.macgap'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.docker.docker'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.loginwindow'
run = 'layout floating'

# Minecraft — pin both the launcher (Chromium) and the game itself
# (Java/LWJGL — bundle id is NULL because it's spawned via the JRE) to
# workspace 8 and float them. Pinning keeps the game from following on
# workspace switches; floating keeps AeroSpace's tiling out of the
# game's way. We deliberately do NOT auto-fullscreen — AeroSpace's
# `fullscreen` can promote the window into macOS-native fullscreen,
# which gives it its own Space and pulls you over to it whenever the
# focus changes. Use Alt+F manually inside the game if wanted.
[[on-window-detected]]
if.app-id = 'com.mojang.minecraftlauncher'
run = ['move-node-to-workspace 8', 'layout floating']

[[on-window-detected]]
if.app-name-regex-substring = '^java$'
if.window-title-regex-substring = '(?i)minecraft'
run = ['move-node-to-workspace 8', 'layout floating']

# Quick-terminal drop-downs and small panels
[[on-window-detected]]
if.window-title-regex-substring = '(?i)preferences'
run = 'layout floating'

# ==========================
# Phantom-window cleanup on every window open
# ==========================
# AeroSpace doesn't expose a window-CLOSED hook (that's the bug we're
# working around — kAXUIElementDestroyedNotification is unreliable on
# macOS 15+). It DOES fire on-window-detected on every open. Hooking
# cleanup here means: any time anything new appears, we sweep stale
# entries left behind by previous closes.
#
# All matching on-window-detected rules run in declaration order
# (per AeroSpace docs), so this catch-all runs alongside the per-app
# rules above without overriding them. The cleanup script is sub-100ms
# and detached, so no perceptible launch lag for new windows.
[[on-window-detected]]
if.app-name-regex-substring = '.*'
run = ['exec-and-forget ~/.config/aerospace/cleanup-phantoms.sh']
